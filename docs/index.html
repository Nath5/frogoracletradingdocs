<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /**
    - main title
    */
    .cover-main h1 a span {
      color: #fff;
      font-weight: bold;
    }

    /**
     - main title's version number
     */
    .cover-main h1 a span small {
      color: fff;
    }

    /**
    - description
     */
    .cover-main blockquote {
      color: #fff;
    }

    /**
    - buttons
     */
    section.cover .cover-main>p:last-child a {
      color: white !important;
    }

    section.cover .cover-main>p:last-child a:hover {
      color: #718EB8 !important;
    }

    /**
    - last button
     */
    section.cover .cover-main>p:last-child a:last-child {
      color: white !important;
    }

    section.cover .cover-main>p:last-child a:last-child:hover {
      color: #172336 !important;
    }

    section.cover .cover-main>p:last-child a:last-child {
      background-color: #718EB8;
      background-color: var(--theme-color, #718EB8);
      color: #fff;
    }

    section.cover .cover-main>p:last-child a {
      border-radius: 2rem;
      border: 1px solid white;
      border-color: var(--theme-color, white);
      box-sizing: border-box;
      /* color: #42b983; */
      color: var(--theme-color, #42b983);
      display: inline-block;
      font-size: 1.05rem;
      letter-spacing: .1rem;
      margin: .5rem 1rem;
      padding: .75em 2rem;
      text-decoration: none;
      transition: all .15s ease;
    }

    img {
      align: center;
    }
  </style>

</head>

<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'FrogOracle Trading',
      search: 'auto',

      coverpage: '_coverpage.md',
      loadSidebar: false,
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>

</html>
